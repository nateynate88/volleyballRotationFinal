<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Volley Lineup</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="lineup-manager" aria-label="Saved lineups">
          <div class="lineup-card">
            <div class="lineup-row">
              <select id="lineupSelect" aria-label="Choose saved lineup"></select>
              <button class="lineup-menu-button" id="lineupMenuButton" type="button" aria-label="Lineup actions" aria-expanded="false">
                <span aria-hidden="true">•••</span>
              </button>
            </div>
            <div class="lineup-menu" id="lineupMenu" hidden>
              <button id="newLineupButton" type="button">New lineup</button>
              <button id="renameLineupButton" type="button">Rename</button>
              <button id="shareLineupButton" type="button">Share</button>
              <button class="danger" id="deleteLineupButton" type="button">Delete</button>
            </div>
          </div>
          <div class="lineup-status" id="lineupStatus" role="status" aria-live="polite"></div>
        </div>
      </header>

      <section class="controls-panel" aria-label="Lineup controls">
        <div class="rotation-strip" id="rotationStrip" role="tablist" aria-label="Rotations"></div>
        <div class="formation-strip" id="formationStrip" role="tablist" aria-label="Formations"></div>
        <div class="libero-warning" id="liberoWarning" role="status" aria-live="polite" hidden></div>
        <div class="coach-check" aria-label="Coach check">
          <button class="coach-check-toggle" id="coachCheckToggle" type="button" aria-expanded="false">
            <span>Coach Check</span>
            <small id="coachCheckCount">Ready</small>
          </button>
          <div class="coach-check-list" id="coachCheckList"></div>
        </div>
      </section>

      <section class="court-section" aria-label="Volleyball court editor">
        <div class="court-wrap">
          <div class="court" id="court" aria-label="Drag players onto the volleyball court">
            <div class="net" aria-hidden="true"></div>
            <div class="attack-line bottom" aria-hidden="true"></div>
            <div class="court-label court-label-top">Front row</div>
            <div class="court-label court-label-bottom">Back row</div>
            <div class="zone-label zone-4">4</div>
            <div class="zone-label zone-3">3</div>
            <div class="zone-label zone-2">2</div>
            <div class="zone-label zone-5">5</div>
            <div class="zone-label zone-6">6</div>
            <div class="zone-label zone-1">1</div>
            <div id="courtPlayers"></div>
            <button class="court-undo-button" id="undoButton" aria-label="Undo last action" disabled>
              <span aria-hidden="true">↺</span>
              <span>Undo</span>
            </button>
          </div>
        </div>
      </section>

      <section class="lineup-panel" aria-label="Roster and bench">
        <div class="bench-zone" id="benchZone">
          <div class="bench-title">
            <span>Bench</span>
            <small>Drag to court</small>
          </div>
          <div class="bench-list" id="benchList"></div>
        </div>
      </section>
    </main>
    <div class="lineup-modal" id="newLineupDialog" hidden>
      <form class="lineup-modal-card" id="newLineupForm">
        <div>
          <p class="eyebrow">New lineup</p>
          <h2>Name this lineup</h2>
        </div>
        <input id="newLineupNameInput" type="text" placeholder="Varsity 6-2" aria-label="New lineup name" />
        <div class="lineup-import-panel">
          <label>
            <span>Import from roster</span>
            <select id="newLineupImportSource" aria-label="Import from roster"></select>
          </label>
          <label class="choice-row">
            <input id="newLineupImportPlayers" type="checkbox" />
            <span>Import players</span>
          </label>
          <label class="choice-row">
            <input id="newLineupImportPositions" type="checkbox" />
            <span>Import saved positions</span>
          </label>
        </div>
        <div class="lineup-modal-actions">
          <button type="submit">Create</button>
          <button id="cancelNewLineupButton" type="button">Cancel</button>
        </div>
      </form>
    </div>

    <div class="lineup-modal" id="renameLineupDialog" hidden>
      <form class="lineup-modal-card" id="renameLineupForm">
        <div>
          <p class="eyebrow">Roster</p>
          <h2>Rename roster</h2>
        </div>
        <input id="renameLineupNameInput" type="text" placeholder="Varsity 6-2" aria-label="Roster name" />
        <div class="lineup-modal-actions">
          <button type="submit">Save</button>
          <button id="cancelRenameLineupButton" type="button">Cancel</button>
        </div>
      </form>
    </div>

    <div class="lineup-modal" id="shareLineupDialog" hidden>
      <div class="lineup-modal-card" role="dialog" aria-modal="true" aria-labelledby="shareLineupTitle">
        <div>
          <p class="eyebrow">Share</p>
          <h2 id="shareLineupTitle">Lineup link</h2>
        </div>
        <textarea id="shareLineupText" class="share-link-field" readonly aria-label="Share lineup link"></textarea>
        <div class="lineup-modal-actions">
          <button id="copyShareLineupButton" type="button">Copy</button>
          <button id="closeShareLineupButton" type="button">Close</button>
        </div>
      </div>
    </div>

    <div class="lineup-modal" id="addPlayerDialog" hidden>
      <form class="lineup-modal-card" id="addPlayerForm">
        <div>
          <p class="eyebrow">Roster</p>
          <h2 id="playerDialogTitle">Add player</h2>
        </div>
        <input id="playerFirstNameInput" name="playerFirstName" autocomplete="given-name" placeholder="First name" aria-label="New player first name" />
        <input id="playerLastNameInput" name="playerLastName" autocomplete="family-name" placeholder="Last name" aria-label="New player last name" />
        <input id="playerNumberInput" name="playerNumber" inputmode="numeric" maxlength="2" placeholder="Number" aria-label="New player number" />
        <select id="playerPositionInput" name="playerPosition" aria-label="New player position"></select>
        <div class="lineup-modal-actions">
          <button id="savePlayerDialogButton" type="submit">Add player</button>
          <button id="deletePlayerDialogButton" class="danger-action" type="button" hidden>Delete</button>
          <button id="cancelAddPlayerButton" type="button">Cancel</button>
        </div>
      </form>
    </div>

    <template id="playerChipTemplate">
      <button class="player-chip" type="button">
        <span class="player-number"></span>
        <span class="player-text">
          <span class="player-name"></span>
          <span class="player-position"></span>
        </span>
      </button>
    </template>

    <script src="app.js?v=overlap-pulse-1"></script>
  </body>
</html>
